[project]
name = "life-finances-simulation"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "life-finances-core",
    "life-finances-domain",
]

[tool.uv.sources]
life-finances-core = { workspace = true }
life-finances-domain = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["simulation"]

<section class="editor-section">
  <h2>{{ sections.HOUSEHOLD_TITLE }}</h2>
  <form
    hx-patch="{{ routes.PLAN_HOUSEHOLD }}?plan={{ plan_id }}"
    hx-trigger="input changed delay:750ms"
    hx-swap="none"
  >
    <fieldset class="person-fields">
      <legend>You</legend>
      <label>
        Birth month
        <select name="{{ forms.PERSON1_BIRTH_MONTH }}">
          {% for month in range(1, 13) %}
          <option value="{{ month }}"{% if plan.household.person1.birth_month == month %} selected{% endif %}>{{ month }}</option>
          {% endfor %}
        </select>
      </label>
      <label>
        Birth year
        <input
          type="number"
          name="{{ forms.PERSON1_BIRTH_YEAR }}"
          value="{{ plan.household.person1.birth_year }}"
        >
      </label>
      <label>
        Max age
        <input
          type="number"
          name="{{ forms.PERSON1_MAX_AGE_YEARS }}"
          value="{{ plan.household.person1.max_age_years }}"
        >
      </label>
    </fieldset>
    <label class="partner-toggle">
      <input
        type="checkbox"
        name="{{ forms.HAS_PARTNER }}"
        {% if plan.household.person2 %}checked{% endif %}
        onchange="this.closest('form').querySelectorAll('.partner-fields input, .partner-fields select').forEach(el => el.disabled = !this.checked)"
      >
      Include a partner
    </label>
    <fieldset class="person-fields partner-fields">
      <legend>Partner</legend>
      <label>
        Birth month
        <select name="{{ forms.PERSON2_BIRTH_MONTH }}"{% if not plan.household.person2 %} disabled{% endif %}>
          {% for month in range(1, 13) %}
          <option value="{{ month }}"{% if plan.household.person2 and plan.household.person2.birth_month == month %} selected{% endif %}>{{ month }}</option>
          {% endfor %}
        </select>
      </label>
      <label>
        Birth year
        <input
          type="number"
          name="{{ forms.PERSON2_BIRTH_YEAR }}"
          value="{{ plan.household.person2.birth_year if plan.household.person2 else '' }}"
          {% if not plan.household.person2 %}disabled{% endif %}
        >
      </label>
      <label>
        Max age
        <input
          type="number"
          name="{{ forms.PERSON2_MAX_AGE_YEARS }}"
          value="{{ plan.household.person2.max_age_years if plan.household.person2 else '' }}"
          {% if not plan.household.person2 %}disabled{% endif %}
        >
      </label>
    </fieldset>
    <fieldset class="tax-fields">
      <legend>Taxes</legend>
      <label>
        Filing status
        <select name="{{ forms.FILING_STATUS }}">
          {% for status in forms.FILING_STATUSES %}
          <option value="{{ status }}"{% if plan.household.resolved_filing_status == status %} selected{% endif %}>{{ forms.FILING_STATUS_LABELS[status] }}</option>
          {% endfor %}
        </select>
      </label>
      <label>
        Residence state
        <input
          type="text"
          name="{{ forms.RESIDENCE_STATE }}"
          value="{{ plan.household.residence_state or '' }}"
          maxlength="2"
          placeholder="e.g. CA"
        >
      </label>
      <label>
        SS &amp; pension taxable fraction
        <input
          type="number"
          step="0.01"
          name="{{ forms.SS_PENSION_TAXABLE_FRACTION }}"
          value="{{ plan.household.ss_pension_taxable_fraction }}"
        >
      </label>
      <label>
        Social Security trust factor
        <input
          type="number"
          step="0.01"
          name="{{ forms.SOCIAL_SECURITY_TRUST_FACTOR }}"
          value="{{ plan.household.social_security_trust_factor }}"
        >
      </label>
    </fieldset>
  </form>
</section>

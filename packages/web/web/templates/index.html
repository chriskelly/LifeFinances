{% extends "base.html" %}

{% block body %}
<header class="app-header">
  <h1>LifeFinances</h1>
  {% include "plan_menu.html" %}
</header>

<div class="layout">
  <div class="editor-pane">
    <div id="form-error" class="form-error" role="alert" hidden></div>
    {% include "editor_household.html" %}
    {% include "editor_portfolio.html" %}
    {% include "editor_settings.html" %}
  </div>
  <div
    id="results-panel"
    hx-get="{{ routes.RESULTS }}?plan={{ plan_id }}"
    hx-vals="js:{chart: document.getElementById('chart-select')?.value}"
    hx-trigger="planUpdated from:body"
    hx-swap="innerHTML"
  >
    {% include "results.html" %}
  </div>
</div>

<script>
  const formError = document.getElementById("form-error");

  document.body.addEventListener("htmx:responseError", function (event) {
    formError.textContent =
      (event.detail.xhr && event.detail.xhr.responseText) ||
      "Something went wrong saving your changes.";
    formError.hidden = false;
  });

  document.body.addEventListener("htmx:afterRequest", function (event) {
    const form = event.detail.elt;
    const patchTarget = form.getAttribute && form.getAttribute("hx-patch");
    const isPlanForm =
      form.tagName === "FORM" &&
      patchTarget &&
      (patchTarget.startsWith("{{ routes.PLAN_HOUSEHOLD }}") ||
        patchTarget.startsWith("{{ routes.PLAN_PORTFOLIO }}") ||
        patchTarget.startsWith("{{ routes.PLAN_SETTINGS }}"));
    if (isPlanForm && event.detail.successful) {
      formError.textContent = "";
      formError.hidden = true;
      document.body.dispatchEvent(new CustomEvent("planUpdated"));
    }
  });

  let plotlyReadyHooked = false;

  function renderResultsChart() {
    if (typeof Plotly === "undefined") {
      if (!plotlyReadyHooked) {
        plotlyReadyHooked = true;
        const plotlyScript = document.getElementById("plotly-cdn");
        if (plotlyScript) {
          plotlyScript.addEventListener("load", renderResultsChart, { once: true });
        }
      }
      return;
    }
    const config = document.getElementById("chart-config");
    if (!config) return;
    const figure = JSON.parse(config.textContent);
    Plotly.react("results-chart", figure.data, figure.layout, { responsive: true });
  }

  document.addEventListener("DOMContentLoaded", renderResultsChart);

  // Render after htmx settling completes, not afterSwap: settling re-applies
  // server-sent attributes to id-matched elements, which strips the
  // js-plotly-plot class (and the absolute positioning it carries) that
  // Plotly adds when rendering during afterSwap, breaking hover tooltips.
  document.body.addEventListener("htmx:afterSettle", function (event) {
    if (event.detail.target && event.detail.target.id === "results-panel") {
      renderResultsChart();
    }
  });
</script>
{% endblock %}

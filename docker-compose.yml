services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/tests:/app/tests:ro
      - ./backend/run.py:/app/run.py:ro
      - ./config.yml:/app/config.yml:ro
    ports:
      - "3500:3500"
    entrypoint:
      - python
      - run.py

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      # Vite runs inside this container; localhost would not reach the backend service.
      VITE_API_PROXY_TARGET: http://backend:3500
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    ports:
      - "5173:5173"
    depends_on:
      - backend
